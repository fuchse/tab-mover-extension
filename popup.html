<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tab Mover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --surface2: #1f1f24;
      --border: #2a2a30;
      --border-hover: #3f3f46;
      --text: #e8e8ed;
      --text-muted: #6b6b78;
      --text-dim: #9999aa;
      --accent: #7c6cfc;
      --accent-glow: rgba(124, 108, 252, 0.15);
      --accent-border: rgba(124, 108, 252, 0.35);
      --green: #34d399;
      --amber: #fbbf24;
      --red: #f87171;
      --blue: #60a5fa;
      --cyan: #22d3ee;
      --pink: #f472b6;

      --group-grey: #6b7280;
      --group-blue: #3b82f6;
      --group-red: #ef4444;
      --group-yellow: #eab308;
      --group-green: #22c55e;
      --group-pink: #ec4899;
      --group-purple: #a855f7;
      --group-cyan: #06b6d4;
      --group-orange: #f97316;
    }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: var(--bg);
      color: var(--text);
      width: 340px;
      min-height: 200px;
      max-height: 560px;
      overflow: hidden;
    }

    .app-shell {
      width: 100%;
      min-height: inherit;
      max-height: inherit;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 0%, rgba(124, 108, 252, 0.16), transparent 30%),
        radial-gradient(circle at 100% 0%, rgba(34, 211, 238, 0.10), transparent 28%),
        var(--bg);
    }

    body.launcher-mode {
      width: 100vw;
      min-height: 100vh;
      max-height: none;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% -10%, rgba(124, 108, 252, 0.24), transparent 34%),
        radial-gradient(circle at 80% 0%, rgba(34, 211, 238, 0.13), transparent 28%),
        #050506;
    }

    body.launcher-mode .app-shell {
      width: min(640px, calc(100vw - 48px));
      height: min(520px, calc(100vh - 48px));
      min-height: 0;
      max-height: none;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 18px;
      box-shadow:
        0 28px 90px rgba(0, 0, 0, 0.62),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Header */
    .header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      flex-shrink: 0;
    }

    body.launcher-mode .header {
      padding: 18px 22px 16px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(24, 24, 27, 0.82);
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }

    .current-tab-icon {
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    body.launcher-mode .current-tab-icon {
      width: 30px;
      height: 30px;
      border-radius: 9px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.24), transparent),
        var(--accent);
      box-shadow: 0 10px 26px rgba(124, 108, 252, 0.35);
    }

    .current-tab-icon svg {
      width: 13px;
      height: 13px;
      fill: #fff;
    }

    .header-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    body.launcher-mode .header-title {
      font-size: 14px;
      letter-spacing: 0.10em;
    }

    .header-tab {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'IBM Plex Sans', sans-serif;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    body.launcher-mode .header-tab {
      max-width: 310px;
      color: var(--text-dim);
      font-size: 12px;
    }

    /* Tabs nav */
    .tab-nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    body.launcher-mode .tab-nav {
      gap: 8px;
      padding: 10px;
      background: rgba(14, 14, 15, 0.58);
      border-bottom-color: rgba(255, 255, 255, 0.08);
    }

    .tab-btn {
      flex: 1;
      padding: 9px 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    body.launcher-mode .tab-btn {
      border: 1px solid transparent;
      border-radius: 11px;
      border-bottom-width: 1px;
      padding: 11px 0;
    }

    .tab-btn svg {
      width: 12px;
      height: 12px;
      stroke: currentColor;
      fill: none;
    }

    .tab-btn:hover { color: var(--text-dim); }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    body.launcher-mode .tab-btn.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.10);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    /* Panels */
    .panels {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    body.launcher-mode .panels {
      padding: 6px 8px 10px;
    }

    .panels::-webkit-scrollbar { width: 4px; }
    .panels::-webkit-scrollbar-track { background: transparent; }
    .panels::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .panel { display: none; padding: 10px 0; }
    .panel.active { display: block; }

    body.launcher-mode .panel {
      padding: 8px 0;
    }

    /* Section */
    .section-label {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 14px 6px;
    }

    body.launcher-mode .section-label {
      padding: 8px 12px 7px;
      color: #7c7c8b;
    }

    /* Items */
    .item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.1s ease;
      border: none;
      width: 100%;
      background: none;
      text-align: left;
    }

    body.launcher-mode .item {
      border-radius: 12px;
      margin: 2px 0;
      padding: 12px 14px;
    }

    .item:hover { background: var(--surface2); }

    body.launcher-mode .item:hover {
      background: rgba(255, 255, 255, 0.07);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    .item:active { background: var(--accent-glow); }

    .item.current {
      background: var(--accent-glow);
      border-left: 2px solid var(--accent);
      padding-left: 12px;
      pointer-events: none;
    }

    body.launcher-mode .item.current {
      border-left: 0;
      padding-left: 14px;
      box-shadow: inset 0 0 0 1px var(--accent-border);
    }

    .item-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item-icon {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-icon svg {
      width: 14px;
      height: 14px;
      stroke: var(--text-muted);
      fill: none;
      stroke-width: 1.5;
    }

    .item-label {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 12px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    body.launcher-mode .item-label {
      font-size: 14px;
    }

    .item-meta {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .item-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--text-dim);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* New item (action) */
    .item-new .item-icon svg {
      stroke: var(--accent);
    }
    .item-new .item-label {
      color: var(--accent);
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 6px 14px;
    }

    body.launcher-mode .divider {
      background: rgba(255, 255, 255, 0.07);
      margin: 10px 4px;
    }

    /* New group form */
    .new-form {
      display: none;
      padding: 10px 14px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      flex-direction: column;
      gap: 8px;
    }

    body.launcher-mode .new-form {
      margin: 8px 0 4px;
      padding: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.055);
    }

    .new-form.visible { display: flex; }

    .form-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .form-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 6px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    body.launcher-mode .form-input {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      background: rgba(0, 0, 0, 0.24);
      border-color: rgba(255, 255, 255, 0.10);
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }

    .color-picker {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .color-swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
      flex-shrink: 0;
    }

    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: var(--text); }

    .form-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.15s;
    }

    body.launcher-mode .btn {
      border-radius: 9px;
      padding: 8px 14px;
    }

    .btn-ghost {
      background: none;
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      background: var(--surface);
      color: var(--text);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 11px;
      color: var(--green);
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
      white-space: nowrap;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Empty state */
    .empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
      font-family: 'IBM Plex Sans', sans-serif;
    }

    /* Loading */
    .loading {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 11px;
    }

    /* Group color map */
    .gc-grey   { background: var(--group-grey); }
    .gc-blue   { background: var(--group-blue); }
    .gc-red    { background: var(--group-red); }
    .gc-yellow { background: var(--group-yellow); }
    .gc-green  { background: var(--group-green); }
    .gc-pink   { background: var(--group-pink); }
    .gc-purple { background: var(--group-purple); }
    .gc-cyan   { background: var(--group-cyan); }
    .gc-orange { background: var(--group-orange); }
  </style>
</head>
<body>

  <main class="app-shell">
  <div class="header">
    <div class="current-tab-icon">
      <svg viewBox="0 0 16 16"><path d="M2 3h12v10H2z"/><path d="M2 6h12" stroke="#fff" stroke-width="1.5" fill="none"/></svg>
    </div>
    <span class="header-title">Tab Mover</span>
    <span class="header-tab" id="current-tab-title">—</span>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-panel="groups">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 6h12"/></svg>
      Groups
    </button>
    <button class="tab-btn" data-panel="windows">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><rect x="1" y="4" width="11" height="9" rx="1.5"/><path d="M4 4V3a1 1 0 011-1h9a1 1 0 011 1v9a1 1 0 01-1 1h-1"/></svg>
      Windows
    </button>
  </div>

  <div class="panels">

    <!-- GROUPS PANEL -->
    <div class="panel active" id="panel-groups">
      <div id="groups-content"><div class="loading">Loading...</div></div>

      <!-- New group form -->
      <div class="new-form" id="new-group-form">
        <div class="form-row">
          <input class="form-input" id="new-group-name" placeholder="Group name (optional)" maxlength="40" />
        </div>
        <div class="color-picker" id="color-picker"></div>
        <div class="form-actions">
          <button class="btn btn-ghost" id="cancel-group">Cancel</button>
          <button class="btn btn-primary" id="confirm-group">Create & Move</button>
        </div>
      </div>
    </div>

    <!-- WINDOWS PANEL -->
    <div class="panel" id="panel-windows">
      <div id="windows-content"><div class="loading">Loading...</div></div>

      <!-- New window form -->
      <div class="new-form" id="new-window-form">
        <div class="form-actions">
          <button class="btn btn-ghost" id="cancel-window">Cancel</button>
          <button class="btn btn-primary" id="confirm-window">Open New Window</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
