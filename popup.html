<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tab Mover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <main class="app-shell">
  <div class="header">
    <div class="current-tab-icon">
      <svg viewBox="0 0 16 16"><path d="M2 3h12v10H2z"/><path d="M2 6h12" stroke="#fff" stroke-width="1.5" fill="none"/></svg>
    </div>
    <span class="header-title">Tab Mover</span>
    <span class="header-tab" id="current-tab-title">—</span>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-panel="groups">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 6h12"/></svg>
      Groups
    </button>
    <button class="tab-btn" data-panel="windows">
      <svg viewBox="0 0 16 16" stroke-width="1.5"><rect x="1" y="4" width="11" height="9" rx="1.5"/><path d="M4 4V3a1 1 0 011-1h9a1 1 0 011 1v9a1 1 0 01-1 1h-1"/></svg>
      Windows
    </button>
  </div>

  <div class="panels">

    <!-- GROUPS PANEL -->
    <div class="panel active" id="panel-groups">
      <div id="groups-content"><div class="loading">Loading...</div></div>

      <!-- New group form -->
      <div class="new-form" id="new-group-form">
        <div class="form-row">
          <input class="form-input" id="new-group-name" placeholder="Group name (optional)" maxlength="40" />
        </div>
        <div class="color-picker" id="color-picker"></div>
        <div class="form-actions">
          <button class="btn btn-ghost" id="cancel-group">Cancel</button>
          <button class="btn btn-primary" id="confirm-group">Create & Move</button>
        </div>
      </div>
    </div>

    <!-- WINDOWS PANEL -->
    <div class="panel" id="panel-windows">
      <div id="windows-content"><div class="loading">Loading...</div></div>

      <!-- New window form -->
      <div class="new-form" id="new-window-form">
        <div class="form-actions">
          <button class="btn btn-ghost" id="cancel-window">Cancel</button>
          <button class="btn btn-primary" id="confirm-window">Open New Window</button>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>
  </main>

  <script src="shared/constants.js"></script>
  <script src="shared/icons.js"></script>
  <script src="popup.js"></script>
</body>
</html>
